<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axiom</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Blueprint Grid Background -->
  <div class="blueprint-grid"></div>

  <!-- Star Field -->
  <div class="star-field" id="starField"></div>

  <!-- Main Hub View -->
  <main class="hub-view" id="hubView">
    <!-- Central Logo -->
    <div class="central-hub">
      <div class="hub-pulse-ring"></div>
      <div class="hub-pulse-ring hub-pulse-ring--2"></div>
      <h1 class="main-title">
        <span class="title-gradient">Axiom</span>
      </h1>
      <p class="subtitle">Learn math with maximum efficiency</p>
      <p class="hub-hint">Select a subject to begin</p>
    </div>

    <!-- Orbital Container -->
    <div class="orbital-container" id="orbitalContainer">
      <!-- Orbital Nodes will be generated by JavaScript -->
    </div>

    <!-- Connection Lines SVG (behind nodes) -->
    <svg class="connection-lines" id="connectionLines">
      <circle class="orbit-track" id="orbitTrack"/>
    </svg>
  </main>

  <!-- Content Panel -->
  <section class="content-panel" id="contentPanel">
    <header class="panel-header">
      <button class="back-button" id="backButton">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        <span>Back to Hub</span>
      </button>
      <div class="panel-title-group">
        <h2 class="panel-title" id="panelTitle">Algebra</h2>
        <p class="panel-subtitle" id="panelSubtitle">The Foundation of Mathematical Reasoning</p>
      </div>
    </header>
    <article class="panel-content" id="panelContent">
      <!-- Content will be loaded dynamically -->
    </article>
    <footer class="panel-footer">
      <div class="chapter-nav">
        <button class="chapter-btn" id="prevChapter" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M15 18l-6-6 6-6"/>
          </svg>
          Previous
        </button>
        <span class="chapter-progress" id="chapterProgress">1 / 3</span>
        <button class="chapter-btn" id="nextChapter">
          Next
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </button>
      </div>
    </footer>
  </section>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
  </div>

<div id="watermark">rinzale</div>

  <script type="module" src="app.js"></script>
</body>
</html>
